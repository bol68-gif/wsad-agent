{% extends "base.html" %} 
 {% block content %} 
 <div class="p-6"> 
     <div class="flex justify-between items-center mb-6"> 
         <div> 
             <h1 class="text-3xl font-black text-white">⚡ Post Pipeline</h1> 
             <p class="text-gray-400 mt-1">Review and approve content before it goes live</p> 
         </div> 
         <button onclick="triggerContentCreation()" 
                 class="px-5 py-2.5 bg-teal-700 hover:bg-teal-600 text-white rounded-xl font-medium"> 
             🚀 Generate Post Now 
         </button> 
     </div> 
 
     <!-- Tabs --> 
     <div class="flex gap-2 mb-6"> 
         <button id="pendingTabBtn" onclick="switchTab('pending')" 
                 class="px-5 py-2.5 bg-teal-700 text-white rounded-xl font-medium text-sm"> 
             ⏳ Pending 
             <span id="pendingCount" class="ml-2 bg-white/20 px-2 py-0.5 rounded-full text-xs">0</span> 
         </button> 
         <button id="postedTabBtn" onclick="switchTab('posted')" 
                 class="px-5 py-2.5 bg-gray-700 text-white rounded-xl font-medium text-sm"> 
             ✅ Posted 
             <span id="postedCount" class="ml-2 bg-white/20 px-2 py-0.5 rounded-full text-xs">0</span> 
         </button> 
     </div> 
 
     <div id="pendingTab"> 
         <div id="pendingContainer" class="space-y-6"> 
             <div class="text-center py-12"> 
                 <div class="text-5xl mb-4 animate-spin">⏳</div> 
                 <p class="text-gray-400">Loading pipeline...</p> 
             </div> 
         </div> 
     </div> 
 
     <div id="postedTab" class="hidden"> 
         <div id="postedContainer" class="space-y-4"></div> 
     </div> 
 </div> 
 
 <script> 
 async function loadPipeline() { 
     const pending = await apiCall('/api/posts/pending'); 
     const posted  = await apiCall('/api/posts/posted'); 
     renderPendingPosts(pending || []); 
     renderPostedPosts(posted  || []); 
     const pc = document.getElementById('pendingCount'); 
     const dc = document.getElementById('postedCount'); 
     if (pc) pc.textContent = (pending || []).length; 
     if (dc) dc.textContent = (posted  || []).length; 
 } 
 
 function renderScoreBar(label, score) { 
     const pct   = ((score || 0) / 10) * 100; 
     const color = score >= 8 ? 'bg-teal-500' : score >= 6 ? 'bg-yellow-500' : 'bg-red-500'; 
     return ` 
         <div> 
             <div class="flex justify-between text-xs text-gray-400 mb-1"> 
                 <span>${label}</span><span>${(score||0).toFixed(1)}/10</span> 
             </div> 
             <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden"> 
                 <div class="h-1.5 ${color} rounded-full" style="width:${pct}%"></div> 
             </div> 
         </div>`; 
 } 
 
 function renderPendingPosts(posts) { 
     const container = document.getElementById('pendingContainer'); 
     if (!container) return; 
     if (!posts.length) { 
         container.innerHTML = ` 
             <div class="text-center py-16 bg-gray-800/40 rounded-2xl border border-gray-700 border-dashed"> 
                 <div class="text-6xl mb-4">🎨</div> 
                 <h3 class="text-xl font-bold text-white mb-2">No Posts Pending</h3> 
                 <p class="text-gray-400 mb-6 max-w-md mx-auto"> 
                     Your AI team is ready to create content.<br> 
                     Click "Generate Post Now" to start the full pipeline. 
                 </p> 
                 <button onclick="triggerContentCreation()" 
                         class="px-8 py-3 bg-teal-700 hover:bg-teal-600 text-white rounded-xl font-bold text-lg transition-colors"> 
                     🚀 Generate Post Now 
                 </button> 
             </div>`; 
         return; 
     } 
 
     container.innerHTML = posts.map(post => ` 
         <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden hover:border-teal-600/50 transition-all"> 
             <div class="bg-gradient-to-r from-teal-900/20 to-gray-800 px-6 py-4 flex justify-between items-center"> 
                 <div> 
                     <h3 class="text-xl font-black text-white">${post.product_name || 'RF Product'}</h3> 
                     <span class="text-teal-400 text-sm">${post.category || ''} • ${post.post_type || 'static'}</span> 
                 </div> 
                 <div class="text-right"> 
                     <div class="text-4xl font-black ${(post.director_score||0) >= 8.5 ? 'text-teal-400' : 'text-yellow-400'}"> 
                         ${(post.director_score||0).toFixed(1)} 
                     </div> 
                     <div class="text-gray-400 text-xs">/ 10</div> 
                 </div> 
             </div> 
 
             <div class="p-6"> 
                 <div class="grid grid-cols-2 gap-3 mb-5"> 
                     ${renderScoreBar('Hook',       post.hook_score)} 
                     ${renderScoreBar('Visual',     post.visual_score)} 
                     ${renderScoreBar('Caption',    post.caption_score)} 
                     ${renderScoreBar('Strategy',   post.strategy_score)} 
                     ${renderScoreBar('Brand',      post.brand_score)} 
                     ${renderScoreBar('Conversion', post.conversion_score)} 
                 </div> 
 
                 <div class="bg-gray-700/40 rounded-xl p-4 mb-4 border border-gray-600/50"> 
                     <p class="text-gray-300 text-sm leading-relaxed"> 
                         ${(post.caption||'Caption being generated...').substring(0,280)}... 
                     </p> 
                 </div> 
 
                 ${post.director_note ? ` 
                     <div class="bg-teal-900/20 border border-teal-700/40 rounded-xl p-3 mb-4"> 
                         <p class="text-teal-300 text-xs">🎬 <strong>Director:</strong> ${post.director_note}</p> 
                     </div>` : ''} 
 
                 ${post.ad_ready ? ` 
                     <div class="bg-green-900/20 border border-green-700/40 rounded-xl p-3 mb-4 flex items-center gap-3"> 
                         <span class="text-2xl">🎯</span> 
                         <div> 
                             <p class="text-green-300 font-bold text-sm">AD READY</p> 
                             <p class="text-gray-400 text-xs">${post.ad_budget || 'Boost this post for maximum reach'}</p> 
                         </div> 
                     </div>` : ''} 
 
                 <div class="grid grid-cols-2 gap-3"> 
                     <button onclick="approvePost(${post.id})" 
                             class="col-span-2 py-3.5 bg-teal-700 hover:bg-teal-600 text-white rounded-xl font-black text-base transition-colors"> 
                         ✅ Approve & Schedule 
                     </button> 
                     <button onclick="regeneratePost(${post.id})" 
                             class="py-3 bg-blue-800 hover:bg-blue-700 text-white rounded-xl font-medium text-sm"> 
                         🔄 Regenerate 
                     </button> 
                     <button onclick="skipPost(${post.id})" 
                             class="py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-xl font-medium text-sm"> 
                         ⏭️ Skip 
                     </button> 
                 </div> 
             </div> 
         </div> 
     `).join(''); 
 } 
 
 function renderPostedPosts(posts) { 
     const container = document.getElementById('postedContainer'); 
     if (!container) return; 
     if (!posts.length) { 
         container.innerHTML = '<div class="text-center py-8 text-gray-500">No posts published yet</div>'; 
         return; 
     } 
     container.innerHTML = posts.map(post => ` 
         <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 flex items-center justify-between hover:border-teal-600/50 transition-all"> 
             <div> 
                 <h4 class="font-bold text-white">${post.product_name || 'RF Post'}</h4> 
                 <p class="text-gray-400 text-xs mt-1"> 
                     ${post.posted_at ? new Date(post.posted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'Recently'} 
                     • ${post.post_type || 'static'} 
                 </p> 
             </div> 
             <div class="flex gap-6 text-center"> 
                 <div><div class="text-teal-400 font-black text-lg">${(post.ig_reach||0).toLocaleString()}</div><div class="text-gray-400 text-xs">Reach</div></div> 
                 <div><div class="text-teal-400 font-black text-lg">${(post.ig_likes||0).toLocaleString()}</div><div class="text-gray-400 text-xs">Likes</div></div> 
                 <div><div class="text-teal-400 font-black text-lg">${(post.ig_saves||0).toLocaleString()}</div><div class="text-gray-400 text-xs">Saves</div></div> 
             </div> 
         </div> 
     `).join(''); 
 } 
 
 async function approvePost(id) { 
     const data = await apiCall(`/api/posts/${id}/approve`, 'POST'); 
     if (data?.success) { showAlert(data.message, 'success'); setTimeout(loadPipeline, 800); } 
 } 
 
 async function skipPost(id) { 
     if (!confirm('Skip this post?')) return; 
     const data = await apiCall(`/api/posts/${id}/skip`, 'POST'); 
     if (data?.success) { showAlert(data.message, 'warning'); setTimeout(loadPipeline, 800); } 
 } 
 
 async function regeneratePost(id) { 
     const data = await apiCall(`/api/posts/${id}/regenerate`, 'POST'); 
     if (data?.success) { showAlert(data.message, 'info'); setTimeout(loadPipeline, 1500); } 
 } 
 
 async function triggerContentCreation() { 
     showAlert('🤖 AI team starting content creation — check Logs page for live progress!', 'info'); 
     const data = await apiCall('/api/scheduler/run_now/content_creation', 'POST'); 
     if (data?.success) { 
         showAlert(data.message, 'success'); 
         setTimeout(loadPipeline, 8000); 
     } 
 } 
 
 function switchTab(tab) { 
     ['pending','posted'].forEach(t => { 
         document.getElementById(`${t}Tab`)?.classList.toggle('hidden', t !== tab); 
         document.getElementById(`${t}TabBtn`)?.classList.toggle('bg-teal-700', t === tab); 
         document.getElementById(`${t}TabBtn`)?.classList.toggle('bg-gray-700', t !== tab); 
     }); 
 } 
 
 loadPipeline(); 
 setInterval(loadPipeline, 30000); 
 </script> 
 {% endblock %}
