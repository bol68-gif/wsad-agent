{% extends "base.html" %}
{% block title %}Notifications{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex justify-between items-center">
        <h2 class="text-3xl bebas teal-text tracking-widest">System Notifications</h2>
        <button onclick="markAllRead()" class="bg-[#1A1A1A] border border-[#333] px-6 py-2 rounded text-xs uppercase hover:text-white transition">Mark All Read</button>
    </div>

    <div class="flex space-x-4 border-b border-[#333] pb-4">
        <button class="text-[10px] uppercase font-bold teal-text border-b-2 border-[#008080] pb-4 px-2">All</button>
        <button class="text-[10px] uppercase font-bold text-gray-500 hover:text-white transition pb-4 px-2">Urgent</button>
        <button class="text-[10px] uppercase font-bold text-gray-500 hover:text-white transition pb-4 px-2">Agent Updates</button>
    </div>

    <div id="notificationsFeed" class="space-y-4">
        <!-- Dynamic Content -->
        <div class="py-20 text-center text-gray-600">
            <p class="text-xs uppercase tracking-widest animate-pulse">Loading notifications...</p>
        </div>
    </div>
</div>

<script> 
 async function loadNotifications() { 
     const data = await apiCall('/api/notifications'); 
     const feed = document.getElementById('notificationsFeed'); 
     if (!feed) return; 
 
     if (!data || !data.length) { 
         feed.innerHTML = '<div class="text-center py-12 text-gray-500"><div class="text-4xl mb-3">🔔</div><p>No notifications yet</p><button onclick="createTestNotif()" class="mt-4 px-4 py-2 bg-teal-700 text-white rounded-lg text-sm hover:bg-teal-600">Create Test Notification</button></div>'; 
         return; 
     } 
 
     feed.innerHTML = data.map(n => ` 
         <div class="flex items-start gap-4 p-4 rounded-xl border ${n.urgent ? 'border-red-500 bg-red-900/10' : 'border-gray-700 bg-gray-800/40'} ${n.read ? 'opacity-50' : ''}"> 
             <div class="text-2xl mt-1">${n.urgent ? '🔴' : n.type === 'success' ? '✅' : 'ℹ️'}</div> 
             <div class="flex-1 min-w-0"> 
                 <div class="flex justify-between items-start gap-2"> 
                     <h3 class="font-bold text-white truncate">${n.title}</h3> 
                     <span class="text-xs text-gray-400 shrink-0">${n.timestamp}</span> 
                 </div> 
                 <p class="text-gray-300 text-sm mt-1">${n.message}</p> 
                 ${n.page_link ? `<a href="${n.page_link}" class="text-teal-400 text-xs mt-1 inline-block hover:underline">View →</a>` : ''} 
             </div> 
             ${!n.read ? `<button onclick="markRead(${n.id})" class="text-xs text-teal-400 hover:text-teal-300 shrink-0 mt-1">Mark read</button>` : '<span class="text-xs text-gray-600 shrink-0 mt-1">Read</span>'} 
         </div> 
     `).join(''); 
 } 
 
 async function markRead(id) { 
     const data = await apiCall(`/api/notifications/mark_read/${id}`, 'POST'); 
     if (data && data.success) { 
         loadNotifications(); 
         loadNotifCount(); 
         showAlert('Marked as read', 'success'); 
     } 
 } 
 
 async function markAllRead() { 
     const data = await apiCall('/api/notifications/mark_all_read', 'POST'); 
     if (data && data.success) { 
         loadNotifications(); 
         loadNotifCount(); 
         showAlert('All notifications cleared', 'success'); 
     } 
 } 
 
 async function createTestNotif() { 
     const data = await apiCall('/api/notifications/create_test', 'POST'); 
     if (data && data.success) { 
         loadNotifications(); 
         showAlert('Test notification created', 'info'); 
     } 
 } 
 
 loadNotifications(); 
 </script>
{% endblock %}
