<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Agent - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0A0A0A; font-family: 'Montserrat', sans-serif; }
        .bebas { font-family: 'Bebas Neue', cursive; }
        .teal-glow { text-shadow: 0 0 20px rgba(0, 128, 128, 0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-6xl bebas text-[#008080] teal-glow tracking-wider">RF AGENT</h1>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em] mt-2">Monsoon Automation System</p>
        </div>

        <div class="bg-[#1A1A1A] border border-[#333] p-8 rounded-xl shadow-2xl">
            {% with messages = get_flashed_messages(category_filter=["error"]) %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="bg-red-900/30 border border-red-500 text-red-500 text-xs p-3 rounded mb-6 text-center">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login_page') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Username</label>
                    <input type="text" name="username" required 
                        class="w-full bg-[#0A0A0A] border border-[#333] text-white p-3 rounded focus:outline-none focus:border-[#008080] transition">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Password</label>
                    <input type="password" name="password" required 
                        class="w-full bg-[#0A0A0A] border border-[#333] text-white p-3 rounded focus:outline-none focus:border-[#008080] transition">
                </div>
                <button type="submit" 
                    class="w-full bg-[#008080] hover:bg-[#005F5F] text-white bebas text-xl py-3 rounded transition tracking-widest shadow-lg shadow-[#008080]/20">
                    ENTER DASHBOARD
                </button>
            </form>
        </div>
        
        <p class="text-center text-gray-600 text-[10px] uppercase tracking-widest mt-8">
            Relax Fashionwear &copy; 2025
        </p>
    </div>
</body>
</html>
