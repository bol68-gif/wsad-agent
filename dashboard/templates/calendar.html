{% extends "base.html" %} 
 {% block content %} 
 <div class="p-6"> 
     <div class="flex items-center justify-between mb-6"> 
         <h1 class="text-3xl font-black text-white">📅 Content Calendar</h1> 
         <div class="flex items-center gap-3"> 
             <button onclick="prevMonth()" 
                     class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition-colors"> 
                 ← Prev 
             </button> 
             <h2 id="calendarTitle" class="text-xl font-bold text-white min-w-48 text-center"></h2> 
             <button onclick="nextMonth()" 
                     class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition-colors"> 
                 Next → 
             </button> 
         </div> 
     </div> 
 
     <!-- Legend --> 
     <div class="flex flex-wrap gap-3 mb-4 text-xs"> 
         <span class="flex items-center gap-1.5 text-gray-400"> 
             <span class="w-3 h-3 rounded-full bg-teal-500 inline-block"></span> Posted 
         </span> 
         <span class="flex items-center gap-1.5 text-gray-400"> 
             <span class="w-3 h-3 rounded-full bg-yellow-500 inline-block"></span> Pending 
         </span> 
         <span class="flex items-center gap-1.5 text-gray-400"> 
             <span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> Approved 
         </span> 
         <span class="flex items-center gap-1.5 text-gray-400"> 
             <span class="w-3 h-3 rounded-full bg-gray-500 inline-block"></span> Empty 
         </span> 
         <span class="flex items-center gap-1.5 text-gray-400"> 
             <span class="w-3 h-3 rounded-full bg-[#1a3333] border border-[#005f5f] inline-block"></span> Planned 
         </span> 
     </div> 
 
     <!-- Calendar Grid --> 
     <div id="calendarGrid" class="grid grid-cols-7 gap-1.5"></div> 
 
     <!-- Day Detail Panel --> 
     <div id="dayDetailPanel" 
          class="hidden fixed right-0 top-0 h-full w-96 bg-gray-800 border-l border-gray-700 p-6 z-50 overflow-y-auto shadow-2xl"> 
         <div class="flex justify-between items-center mb-6"> 
             <h3 class="text-lg font-bold text-white">Post Details</h3> 
             <button onclick="document.getElementById('dayDetailPanel').classList.add('hidden')" 
                     class="text-gray-400 hover:text-white text-2xl leading-none">×</button> 
         </div> 
         <div id="dayDetailContent"></div> 
     </div> 
 </div> 
 
 <script> 
 let currentYear  = new Date().getFullYear(); 
 let currentMonth = new Date().getMonth() + 1; 
 
 const EMOJIS = { 
     static:'📸', reel:'🎬', carousel:'📊', story:'📱', 
     factory:'🏭', offer:'⚡', lifestyle:'🌊', social_proof:'⭐', weather:'🌧️' 
 }; 
 
 const STATUS_BORDER = { 
     pending:        'border-yellow-500', 
     approved:       'border-blue-500', 
     posted:         'border-teal-500', 
     skipped:        'border-red-500', 
     needs_revision: 'border-orange-500', 
 }; 
 
 async function loadCalendar(year, month) { 
     const data = await apiCall(`/api/calendar/${year}/${month}`); 
     renderCalendar(year, month, data || []); 
     await loadMonthlyPlan();
 } 

 async function loadMonthlyPlan() { 
     try { 
         const data = await apiCall('/api/monthly_plan'); 
         if (!data || !data.weeks) return; 
         // Mark planned days on calendar with different color 
         data.weeks.forEach(week => { 
             week.days.forEach(day => { 
                 const cell = document.querySelector(`[onclick="showDayDetail(${day.date})"]`); 
                 if (cell && !cell.innerHTML.includes('text-teal-400')) { 
                     cell.style.borderColor = '#1a3333'; 
                     cell.innerHTML += `<div style="font-size:8px;color:#005f5f;margin-top:2px;font-weight:700">${day.product.split(' ')[0]}</div>`; 
                 } 
             }); 
         }); 
     } catch(e) {} 
 } 
 
 function renderCalendar(year, month, posts) { 
     const grid  = document.getElementById('calendarGrid'); 
     const title = document.getElementById('calendarTitle'); 
     if (!grid) return; 
 
     const monthNames = ['January','February','March','April','May','June', 
                         'July','August','September','October','November','December']; 
     if (title) title.textContent = `${monthNames[month-1]} ${year}`; 
 
     const firstDay    = new Date(year, month-1, 1).getDay(); 
     const daysInMonth = new Date(year, month, 0).getDate(); 
     const today       = new Date(); 
 
     const postsByDay = {}; 
     posts.forEach(p => { 
         const day = new Date(p.date).getDate(); 
         if (!postsByDay[day]) postsByDay[day] = []; 
         postsByDay[day].push(p); 
     }); 
 
     const dayHeaders = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']; 
     let html = dayHeaders.map(d => 
         `<div class="text-center text-xs font-bold text-gray-500 py-2 uppercase tracking-wide">${d}</div>` 
     ).join(''); 
 
     const offset = firstDay === 0 ? 6 : firstDay - 1; 
     for (let i = 0; i < offset; i++) { 
         html += `<div class="min-h-24 rounded-xl bg-gray-800/20"></div>`; 
     } 
 
     for (let day = 1; day <= daysInMonth; day++) { 
         const isToday  = day === today.getDate() && 
                          month === today.getMonth()+1 && 
                          year  === today.getFullYear(); 
         const post     = (postsByDay[day] || [])[0]; 
         const border   = isToday ? 'border-2 border-teal-400' : 
                          post ? `border-2 ${STATUS_BORDER[post.status]||'border-gray-600'}` : 
                          'border border-gray-700/50'; 
         const emoji    = post ? (EMOJIS[post.post_type] || '📝') : ''; 
 
         html += ` 
             <div class="min-h-24 rounded-xl p-2 cursor-pointer 
                         hover:border-teal-500 hover:bg-gray-700/50 transition-all 
                         bg-gray-800/60 ${border}" 
                  onclick="showDayDetail(${day})"> 
                 <div class="flex justify-between items-start mb-1"> 
                     <span class="text-sm font-bold ${isToday ? 'text-teal-400' : 'text-gray-300'}">${day}</span> 
                     ${post ? `<span class="text-xs text-teal-400 font-bold">${(post.director_score||0).toFixed(1)}</span>` : ''} 
                 </div> 
                 ${emoji ? `<div class="text-xl text-center my-1">${emoji}</div>` : '<div class="my-4"></div>'} 
                 ${post ? `<div class="text-xs text-gray-400 truncate">${post.product_name||''}</div>` : ''} 
             </div>`; 
     } 
 
     grid.innerHTML = html; 
 } 
 
 let _calendarPosts = []; 
 
 async function showDayDetail(day) { 
     const data  = await apiCall(`/api/calendar/${currentYear}/${currentMonth}`); 
     _calendarPosts = data || []; 
     const posts = _calendarPosts.filter(p => new Date(p.date).getDate() === day); 
     const panel = document.getElementById('dayDetailPanel'); 
     const cont  = document.getElementById('dayDetailContent'); 
     if (!panel || !cont) return; 
 
     if (!posts.length) { 
         cont.innerHTML = ` 
             <div class="text-center py-8"> 
                 <div class="text-5xl mb-4">📅</div> 
                 <p class="text-gray-400 mb-2">No post for ${day}/${currentMonth}/${currentYear}</p> 
                 <p class="text-gray-500 text-sm">Your AI team will create content based on the weekly rotation plan.</p> 
             </div>`; 
     } else { 
         const post = posts[0]; 
         cont.innerHTML = ` 
             <div class="space-y-4"> 
                 <div class="flex justify-between items-start"> 
                     <h3 class="font-black text-white text-lg">${post.product_name}</h3> 
                     <span class="text-3xl font-black text-teal-400">${(post.director_score||0).toFixed(1)}</span> 
                 </div> 
                 <span class="inline-block px-3 py-1 rounded-full text-xs font-medium 
                     ${post.status==='posted' ? 'bg-teal-900/50 text-teal-300 border border-teal-700' : 
                       post.status==='pending' ? 'bg-yellow-900/50 text-yellow-300 border border-yellow-700' : 
                       'bg-gray-700 text-gray-300 border border-gray-600'}"> 
                     ${(post.status||'unknown').toUpperCase()} 
                 </span> 
                 <div class="bg-gray-700/40 rounded-xl p-4"> 
                     <p class="text-gray-300 text-sm leading-relaxed"> 
                         ${(post.caption||'').substring(0,300)}... 
                     </p> 
                 </div> 
                 ${post.director_note ? ` 
                     <div class="bg-teal-900/20 border border-teal-700/40 rounded-xl p-3"> 
                         <p class="text-teal-300 text-xs">🎬 ${post.director_note}</p> 
                     </div>` : ''} 
                 ${post.status === 'pending' ? ` 
                     <div class="grid grid-cols-2 gap-2 mt-4"> 
                         <button onclick="approveFromCal(${post.id})" 
                                 class="py-2.5 bg-teal-700 hover:bg-teal-600 text-white rounded-xl text-sm font-bold"> 
                             ✅ Approve 
                         </button>
                         <button onclick="skipFromCal(${post.id})" 
                                 class="py-2.5 bg-gray-700 hover:bg-gray-600 text-white rounded-xl text-sm font-bold"> 
                             ⏭️ Skip 
                         </button>
                     </div>` : ''} 
             </div>`; 
     } 
     panel.classList.remove('hidden'); 
 } 
 
 async function approveFromCal(id) { 
     const data = await apiCall(`/api/posts/${id}/approve`, 'POST'); 
     if (data?.success) { 
         showAlert(data.message, 'success'); 
         loadCalendar(currentYear, currentMonth); 
         document.getElementById('dayDetailPanel')?.classList.add('hidden'); 
     } 
 } 
 
 async function skipFromCal(id) { 
     const data = await apiCall(`/api/posts/${id}/skip`, 'POST'); 
     if (data?.success) { 
         showAlert(data.message, 'warning'); 
         loadCalendar(currentYear, currentMonth); 
         document.getElementById('dayDetailPanel')?.classList.add('hidden'); 
     } 
 } 
 
 function prevMonth() { 
     currentMonth--; 
     if (currentMonth < 1) { currentMonth = 12; currentYear--; } 
     loadCalendar(currentYear, currentMonth); 
 } 
 
 function nextMonth() { 
     currentMonth++; 
     if (currentMonth > 12) { currentMonth = 1; currentYear++; } 
     loadCalendar(currentYear, currentMonth); 
 } 
 
 loadCalendar(currentYear, currentMonth); 
 </script> 
 {% endblock %}
